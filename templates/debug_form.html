<!DOCTYPE html>
<html>
<head>
    <title>Debug Form</title>
</head>
<body>
    <h1>Debug Form - Test Your Input Values</h1>
    
    <form action="/debug_predict" method="POST" id="debugForm">
        <label>Age:</label>
        <input type="number" name="Age" step="1" value="45"><br><br>
        
        <label>BMI:</label>
        <input type="number" name="BMI" step="0.1" value="22.5"><br><br>
        
        <label>Sleep Hours:</label>
        <input type="number" name="SleepHours" step="0.5" value="8"><br><br>
        
        <label>Exercise Hours:</label>
        <input type="number" name="ExerciseHours" step="0.5" value="4"><br><br>
        
        <label>Smoking:</label>
        <select name="Smoking">
            <option value="0">Non-Smoker</option>
            <option value="1">Smoker</option>
        </select><br><br>
        
        <button type="submit">Submit</button>
    </form>
    
    <div id="debugOutput" style="margin-top: 20px; padding: 10px; background: #f0f0f0;"></div>
    
    <script>
        const form = document.getElementById('debugForm');
        const debugOutput = document.getElementById('debugOutput');
        
        // Log all input changes
        const inputs = form.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('change', function(e) {
                console.log(`🔵 ${this.name} changed to: ${this.value}`);
                debugOutput.innerHTML += `<p>${new Date().toLocaleTimeString()}: ${this.name} = ${this.value}</p>`;
            });
        });
        
        // Log form submission
        form.addEventListener('submit', function(e) {
            console.log('=== FORM SUBMISSION ===');
            const formData = new FormData(form);
            for (let [key, value] of formData.entries()) {
                console.log(`📤 Sending: ${key} = ${value}`);
            }
            debugOutput.innerHTML += `<hr><strong>Submitting:</strong><br>`;
            for (let [key, value] of formData.entries()) {
                debugOutput.innerHTML += `${key} = ${value}<br>`;
            }
        });
    </script>
</body>
</html>
